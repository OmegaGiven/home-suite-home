services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: home_suite_home
      POSTGRES_USER: hsh
      POSTGRES_PASSWORD: hsh
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  coturn:
    image: coturn/coturn:4.6.3
    command:
      - -n
      - --log-file=stdout
      - --min-port=49160
      - --max-port=49200
      - --realm=home-suite-home.local
      - --use-auth-secret
      - --static-auth-secret=hshturn
      - --listening-port=3478
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

  drawio:
    image: jgraph/drawio:latest
    ports:
      - "18083:8080"

  server:
    build:
      context: ./server
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      STORAGE_ROOT: /app/storage
      DATABASE_URL: postgres://hsh:hsh@postgres:5432/home_suite_home
      TURN_URLS: turn:coturn:3478?transport=udp
      WHISPER_COMMAND: /usr/local/bin/whisper-cli
      FFMPEG_COMMAND: /usr/bin/ffmpeg
      TRANSCRIPTION_MODEL: tiny.en
      TRANSCRIPTION_MODEL_PATH: /opt/whisper/models/ggml-tiny.en.bin
    depends_on:
      - postgres
      - coturn
    volumes:
      - server-storage:/app/storage
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_DRAWIO_URL: http://localhost:18083
    depends_on:
      - server
      - drawio
    ports:
      - "4173:4173"

volumes:
  postgres-data:
  server-storage:
